<style>
@font-face { font-family:"CCS Belvare"; src:url("assets/fonts/ccsbelvareregular.ttf") format("truetype"); font-weight:400; font-display:swap; }
@font-face { font-family:"Luxurious Script"; src:url("assets/fonts/LuxuriousScript-Regular.ttf") format("truetype"); font-weight:400; font-display:swap; }
@font-face { font-family:"Lato"; src:url("assets/fonts/Lato-Regular.ttf") format("truetype"); font-weight:400; font-display:swap; }
@font-face { font-family:"Lato"; src:url("assets/fonts/Lato-Bold.ttf") format("truetype"); font-weight:700; font-display:swap; }
@font-face { font-family:"Lato"; src:url("assets/fonts/Lato-BoldItalic.ttf") format("truetype"); font-weight:700; font-style:italic; font-display:swap; }

:root{
  --paper:#fff5e1;
  --paper-soft:#fbefda;
  --wine:#47072c;
  --plum:#700143;
  --olive:#4c5409;
  --harvest:#7c8419;
  --ink:#2a0418;
  --serif:"CCS Belvare", Georgia, serif;
  --script:"Luxurious Script", cursive;
  --sans:"Lato","Segoe UI","Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html{scroll-behavior:smooth; background:var(--wine);}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--wine);
  overflow-x:hidden;
  line-height:1.5;
}
::selection{background:rgba(112,1,67,0.25); color:var(--paper);}
img,svg{display:block;max-width:100%;}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
a{color:inherit;text-decoration:none;}

h1,h2,h3,h4{font-family:var(--serif); text-transform:uppercase; letter-spacing:0.03em; font-weight:400; line-height:0.92;}
.script{font-family:var(--script); text-transform:none; letter-spacing:normal; font-style:normal; line-height:1;}
.lato-expanded{font-family:var(--sans); text-transform:uppercase; letter-spacing:0.42em; font-weight:400; font-feature-settings:"tnum";}
.fecha-flanqueo{font-family:var(--sans); font-weight:700; font-style:italic; text-transform:uppercase; letter-spacing:0.32em;}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}

.photo-dreamy{filter:brightness(1.04) contrast(0.94) saturate(0.92);}
/* Global grain overlay — sits above everything, non-interactive */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:9998;
  opacity:.22; mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch' seed='4'/><feColorMatrix values='0 0 0 0 0.28  0 0 0 0 0.03  0 0 0 0 0.17  0 0 0 0.75 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-size: 240px 240px;
  transition:opacity .35s ease;
}
.no-grain body::before, html.no-grain body::before{opacity:0;}

/* Legacy class still used by sections — now same treatment, slightly stronger */
.grain{position:relative;}
.grain::after{
  content:""; position:absolute; inset:0; pointer-events:none; opacity:.35; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.82  0 0 0 0.6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  transition:opacity .4s;
}
.no-grain .grain::after{opacity:0;}

/* Seamless section chaining */
section{position:relative;}

/* Hover lift */
.lift{transition: transform .5s cubic-bezier(.22,1,.36,1), box-shadow .5s;}
.lift:hover{transform:translateY(-4px);}

/* Reveal base */
.rv{opacity:0; transform:translateY(28px); transition:opacity 1s cubic-bezier(.22,1,.36,1), transform 1s cubic-bezier(.22,1,.36,1);}
.rv.in{opacity:1; transform:none;}
.rv.d1{transition-delay:.08s;} .rv.d2{transition-delay:.16s;} .rv.d3{transition-delay:.24s;} .rv.d4{transition-delay:.32s;} .rv.d5{transition-delay:.40s;}

.clip-reveal{display:inline-block; overflow:hidden; vertical-align:bottom; padding:0.15em 0.08em 0.28em;}
.clip-reveal > span{display:inline-block; transform:translateY(102%); transition:transform 1.1s cubic-bezier(.22,1,.36,1);}
.clip-reveal.in{overflow:visible;}
.clip-reveal.in > span{transform:none;}

/* Marquee */
@keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-50%);} }
.marquee{display:flex; overflow:hidden; white-space:nowrap; user-select:none;}
.marquee-track{display:flex; animation:marquee 42s linear infinite; flex-shrink:0;}
.marquee-slow .marquee-track{animation-duration:60s;}
.marquee:hover .marquee-track{animation-play-state:paused;}

/* Subtle float */
@keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
.bob{animation:bob 6s ease-in-out infinite;}

/* Background textures */
.tex-paper{
  background:
    radial-gradient(circle at 20% 10%, rgba(112,1,67,0.06), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(76,84,9,0.05), transparent 45%),
    linear-gradient(180deg,#fff7e9 0%, #fff5e1 50%, #fbefda 100%);
}
.tex-wine{
  background:
    radial-gradient(circle at 15% 20%, rgba(124,132,25,0.12), transparent 45%),
    radial-gradient(circle at 85% 75%, rgba(112,1,67,0.5), transparent 50%),
    linear-gradient(180deg, #3a0623 0%, #47072c 50%, #2f041d 100%);
}
.tex-plum{
  background:
    radial-gradient(circle at 75% 15%, rgba(124,132,25,0.14), transparent 50%),
    linear-gradient(170deg, #5a0236 0%, #700143 50%, #4d0230 100%);
}
.tex-olive{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,245,225,0.06), transparent 50%),
    linear-gradient(180deg, #3d430a 0%, #4c5409 50%, #3a4008 100%);
}

/* Cursor-ish highlight link */
.hover-underline{position:relative; display:inline-block;}
.hover-underline::after{content:""; position:absolute; left:0; bottom:-2px; height:1px; width:100%; background:currentColor; transform:scaleX(0); transform-origin:right; transition:transform .6s cubic-bezier(.22,1,.36,1);}
.hover-underline:hover::after{transform:scaleX(1); transform-origin:left;}

/* Scroll progress bar */
.scroll-progress{position:fixed; top:0; left:0; height:2px; background:var(--harvest); z-index:100; width:0%; transition:width .1s linear;}

/* Utility */
.sticky-frame{position:sticky; top:0; height:100vh;}
.vh-100{min-height:100vh;}

/* FAQ details */
details summary{list-style:none; cursor:pointer;}
details summary::-webkit-details-marker{display:none;}
details[open] .plus{transform:rotate(45deg);}
.plus{transition:transform .4s cubic-bezier(.22,1,.36,1);}

/* Tweaks panel */
.tweaks-panel{
  position:fixed; right:20px; bottom:20px; z-index:200;
  background:var(--wine); color:var(--paper);
  border:1px solid rgba(255,245,225,0.15);
  border-radius:18px; padding:20px;
  width:300px; max-height:80vh; overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  font-size:13px;
  transform:translateY(calc(100% + 30px)); opacity:0; transition:transform .5s cubic-bezier(.22,1,.36,1), opacity .3s;
  pointer-events:none;
  backdrop-filter:blur(12px);
}
.tweaks-panel.open{transform:none; opacity:1; pointer-events:auto;}
.tweaks-panel h4{font-size:11px; letter-spacing:0.32em; opacity:.7; margin-bottom:10px; font-family:var(--sans); text-transform:uppercase;}
.tweaks-panel .row{margin-bottom:18px;}
.tweaks-panel .opts{display:flex; gap:6px; flex-wrap:wrap;}
.tweaks-panel .opt{padding:7px 11px; border:1px solid rgba(255,245,225,0.2); border-radius:999px; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all .25s;}
.tweaks-panel .opt.active{background:var(--paper); color:var(--wine); border-color:var(--paper);}
.tweaks-panel .opt:hover:not(.active){background:rgba(255,245,225,0.1);}

@media (max-width:640px){
  .tweaks-panel{right:10px; left:10px; bottom:10px; width:auto;}
}
</style>
